<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novamira Network Audit Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#faf9f5;--card:#fff;--surf:#f0eee8;--info-bg:#E6F1FB;--info:#185FA5;--ok-bg:#EAF3DE;--ok:#3B6D11;--warn-bg:#FAEEDA;--warn:#854F0B;--bad-bg:#FCEBEB;--bad:#A32D2D;--tp:#1a1a18;--ts:#6b6a64;--bt:rgba(0,0,0,.12);--bs:rgba(0,0,0,.26);--r:8px;--rl:12px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
@media (prefers-color-scheme:dark){:root{--bg:#191817;--card:#262624;--surf:#201f1e;--info-bg:#0C447C;--info:#85B7EB;--ok-bg:#27500A;--ok:#97C459;--warn-bg:#633806;--warn:#FAC775;--bad-bg:#791F1F;--bad:#F09595;--tp:#ECEAE3;--ts:#a3a199;--bt:rgba(255,255,255,.14);--bs:rgba(255,255,255,.3)}}
*{box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--tp);margin:0;padding:26px 18px;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto}h1{font-size:23px;font-weight:500;margin:0 0 2px}h2{font-size:16px;font-weight:500;margin:26px 0 12px}
.sub{font-size:13px;color:var(--ts);margin:0}
.hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ts);border:.5px solid var(--bs);border-radius:20px;padding:5px 11px;white-space:nowrap}
.ld{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:p 2s infinite}.ld.err{background:var(--bad);animation:none}.ld.stale{background:var(--warn);animation:none}
@keyframes p{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:20px 0}
.mc{background:var(--surf);border-radius:var(--r);padding:14px 16px}.mc .l{font-size:13px;color:var(--ts)}.mc .v{font-size:27px;font-weight:500;margin-top:2px}.mc .s{font-size:12px;color:var(--ts)}
.grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:18px}@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.card{background:var(--card);border:.5px solid var(--bt);border-radius:var(--rl);padding:16px 18px}
.funnel div{margin-bottom:9px}.fbar{height:26px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:13px;color:#fff;font-weight:500}
.prog{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:13px}.prog .lab{width:120px;color:var(--ts)}.prog .tr{flex:1;height:8px;border-radius:5px;background:var(--bt);overflow:hidden}.prog .fl{height:100%}.prog .pc{width:64px;text-align:right;font-weight:500}
.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 12px}
.chip{font-size:12px;padding:5px 11px;border-radius:var(--r);border:.5px solid var(--bs);background:transparent;color:var(--tp);cursor:pointer}.chip.on{background:var(--surf)}
input[type=search]{font-family:inherit;font-size:13px;padding:7px 11px;border-radius:var(--r);border:.5px solid var(--bs);background:var(--card);color:var(--tp);min-width:180px}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--ts);font-weight:500;padding:8px 10px;border-bottom:.5px solid var(--bt);position:sticky;top:0;background:var(--bg)}
td{padding:8px 10px;border-bottom:.5px solid var(--bt)}tr:hover td{background:var(--surf)}
.tag{font-size:11px;padding:2px 8px;border-radius:var(--r);display:inline-block}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:1px}
.yes{color:var(--ok)}.no{color:var(--ts);opacity:.5}
.banner{background:var(--bad-bg);color:var(--bad);border-radius:var(--r);padding:10px 14px;font-size:13px;margin:14px 0;display:none}
</style></head><body><div class="wrap">
<div class="hd">
  <div><h1>Novamira network audit dashboard</h1><p class="sub" id="gen">Loading…</p></div>
  <div class="live"><span class="ld" id="ld"></span><span id="lt">Connecting…</span></div>
</div>
<div class="banner" id="banner"></div>
<div class="kpis" id="kpis"></div>

<div class="grid2">
  <div class="card"><h2 style="margin-top:0">Audit pipeline</h2><div class="funnel" id="funnel"></div>
    <h2>Network coverage</h2><div id="coverage"></div></div>
  <div class="card"><h2 style="margin-top:0">Audit status</h2><div style="position:relative;height:200px"><canvas id="statusChart" role="img" aria-label="Audit status breakdown"></canvas></div>
    <h2>Domain types</h2><div style="position:relative;height:200px"><canvas id="typeChart" role="img" aria-label="Domain type breakdown"></canvas></div></div>
</div>

<h2>Sites <span class="sub" id="count"></span></h2>
<div class="chips" id="chips"></div>
<div class="chips"><input type="search" id="q" placeholder="Search domain..." oninput="render()"><select id="qtype" onchange="render()" style="font-family:inherit;font-size:13px;padding:7px 11px;border-radius:var(--r);border:.5px solid var(--bs);background:var(--card);color:var(--tp)"><option value="">All types</option></select></div>
<div class="card" style="padding:0;overflow:hidden">
<table><thead><tr><th>Domain</th><th>Type</th><th>Working</th><th>Novamira</th><th>Audit status</th><th>Score</th><th>Verify / Execute</th></tr></thead><tbody id="tb"></tbody></table>
</div>
<p class="sub" style="margin-top:14px"><i class="ti ti-info-circle"></i> Live from Google Sheets via Composio · auto-refresh. Pass threshold = <span id="pt"></span>. WordPress SOP v3.</p>
</div>
<script>
/* ===== live feed (Composio -> Google Sheet -> this dashboard) ===== */
const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/1zsJoe8W1Pq-vwC32gUbYqEtIncCv1Ut2wZa4at8oXLA/gviz/tq?tqx=out:csv&sheet=Sheet1";
const REFRESH_MS=45000, PASS_THRESHOLD=80;
const SC={passed:["var(--ok-bg)","var(--ok)","#3B6D11"],issues:["var(--bad-bg)","var(--bad)","#A32D2D"],ready:["var(--info-bg)","var(--info)","#185FA5"],pending:["var(--surf)","var(--ts)","#888780"],broken:["var(--warn-bg)","var(--warn)","#854F0B"]};
const SLBL={passed:"Passed",issues:"Issues",ready:"Ready to audit",pending:"Awaiting connection",broken:"Broken / check"};
const $=id=>document.getElementById(id);
let D=null, filt="all", lastGood=null, statusChart=null, typeChart=null;

function parseCSV(t){const rows=[];let row=[],f="",q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}else{if(c==='"')q=true;else if(c===',' ){row.push(f);f="";}else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";}else if(c==='\r'){}else f+=c;}}if(f.length||row.length){row.push(f);rows.push(row);}return rows.filter(r=>r.some(c=>c!==""));}
const B=v=>/^true$/i.test((v||"").trim());
const numOr=v=>{v=(v||"").trim();return v===""?undefined:Number(v);};

function build(rows){
  const head=rows[0].map(h=>h.trim());
  const idx=Object.fromEntries(head.map((h,i)=>[h,i]));
  const sites=rows.slice(1).map(r=>{
    const g=k=>r[idx[k]]!==undefined?r[idx[k]]:"";
    const s={domain:g("domain"),type:g("type")||"Unspecified",working:B(g("working")),working_raw:g("working_raw"),
      nova:B(g("nova")),mainwp:B(g("mainwp")),analytics:B(g("analytics")),webmaster:B(g("webmaster")),
      tagmgr:B(g("tagmgr")),backup:B(g("backup")),recaptcha:B(g("recaptcha")),status:(g("status")||"pending").trim()};
    const sc=numOr(g("score")); if(sc!==undefined)s.score=sc;
    const gr=(g("grade")||"").trim(); if(gr)s.grade=gr;
    const ve=numOr(g("verify")); if(ve!==undefined)s.verify=ve;
    const ex=numOr(g("execute")); if(ex!==undefined)s.execute=ex;
    return s;
  }).filter(s=>s.domain);
  const cnt=f=>sites.filter(f).length;
  const audited=sites.filter(s=>s.score!==undefined);
  const avg=audited.length?Number((audited.reduce((a,s)=>a+s.score,0)/audited.length).toFixed(1)):null;
  const dtype={}; sites.forEach(s=>dtype[s.type]=(dtype[s.type]||0)+1);
  const status={pending:0,broken:0,passed:0,ready:0,issues:0};
  sites.forEach(s=>{if(status[s.status]===undefined)status[s.status]=0;status[s.status]++;});
  return {sites,
    kpi:{total:sites.length,nova:cnt(s=>s.nova),working:cnt(s=>s.working),mainwp:cnt(s=>s.mainwp),
      analytics:cnt(s=>s.analytics),webmaster:cnt(s=>s.webmaster),backup:cnt(s=>s.backup),
      audited:audited.length,passed:cnt(s=>s.status==='passed'),avg:avg},
    dtype,status};
}

function renderAll(){
  const k=D.kpi;
  $('pt').textContent=PASS_THRESHOLD;
  const kpiDefs=[["Total sites",k.total,""],["Novamira connected",k.nova,Math.round(k.nova/k.total*100)+"% of network"],
    ["Audited",k.audited,k.nova+" connected"],["Passing",k.passed,"score ≥ "+PASS_THRESHOLD],
    ["Working",k.working,(k.total-k.working)+" need a fix"],["Avg score",k.avg??"—","audited sites"]];
  $('kpis').innerHTML=kpiDefs.map(([l,v,s])=>`<div class="mc"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`).join('');
  const fsteps=[["Total network",k.total,"#888780"],["Working",k.working,"#185FA5"],["Novamira connected",k.nova,"#185FA5"],["Audited",k.audited,"#3B6D11"],["Passing",k.passed,"#3B6D11"]];
  $('funnel').innerHTML=fsteps.map(([l,v,c])=>`<div><div class="fbar" style="width:${Math.max(v/k.total*100,11)}%;background:${c}">${v} ${l}</div></div>`).join('');
  const cov=[["Novamira",k.nova,0],["Analytics",k.analytics,0],["Search Console",k.webmaster,0],["Backup admin",k.backup,0],["MainWP",k.mainwp,1]];
  $('coverage').innerHTML=cov.map(([l,v,unt])=>{if(unt)return `<div class="prog"><span class="lab">${l}</span><span class="tr"></span><span class="pc" style="color:var(--ts);font-weight:400">untracked</span></div>`;const p=Math.round(v/k.total*100);return `<div class="prog"><span class="lab">${l}</span><span class="tr"><span class="fl" style="width:${p}%;background:var(--info)"></span></span><span class="pc">${v} · ${p}%</span></div>`;}).join('');
  $('chips').innerHTML=['all',...Object.keys(SLBL)].map(s=>`<button class="chip ${s===filt?'on':''}" data-s="${s}" onclick="setF(this,'${s}')">${s==='all'?'All':SLBL[s]} ${s==='all'?k.total:(D.status[s]||0)}</button>`).join('');
  const qt=$('qtype'),cur=qt.value;
  qt.innerHTML='<option value="">All types ('+D.sites.length+')</option>'+Object.entries(D.dtype).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<option value="${t}"${t===cur?' selected':''}>${t} (${n})</option>`).join('');
  drawCharts();
  render();
}
function setF(b,s){filt=s;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');render();}
function render(){
  if(!D)return;
  const q=$('q').value.toLowerCase(), tf=$('qtype').value;
  const rows=D.sites.filter(s=>(filt==='all'||s.status===filt)&&(tf===''||s.type===tf)&&s.domain.toLowerCase().includes(q));
  $('count').textContent=`(${rows.length} of ${D.sites.length})`;
  $('tb').innerHTML=rows.map(s=>{const c=SC[s.status]||SC.pending;return `<tr>
   <td style="font-weight:500">${s.domain}</td><td style="color:var(--ts)">${s.type}</td>
   <td>${s.working?'<span class="yes"><i class="ti ti-check"></i></span>':'<span class="no">'+(s.working_raw||'—')+'</span>'}</td>
   <td>${s.nova?'<span class="yes"><i class="ti ti-check"></i></span>':'<span class="no"><i class="ti ti-minus"></i></span>'}</td>
   <td><span class="tag" style="background:${c[0]};color:${c[1]}"><span class="dot" style="background:${c[1]}"></span>${SLBL[s.status]||s.status}</span></td>
   <td>${s.score!==undefined?('<b>'+(s.grade||'')+'</b> '+s.score):'<span class="no">—</span>'}</td>
   <td style="color:var(--ts)">${s.verify!==undefined?(s.verify+' / '+s.execute):'—'}</td></tr>`;}).join('');
}
function drawCharts(){
  const dark=matchMedia('(prefers-color-scheme:dark)').matches;
  const grid=dark?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)', tcol=dark?'#a3a199':'#6b6a64';
  if(statusChart)statusChart.destroy();
  statusChart=new Chart($('statusChart'),{type:'doughnut',data:{labels:Object.keys(D.status).map(s=>SLBL[s]||s),datasets:[{data:Object.values(D.status),backgroundColor:Object.keys(D.status).map(s=>(SC[s]||SC.pending)[2]),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:tcol,boxWidth:12,font:{size:11}}}}}});
  if(typeChart)typeChart.destroy();
  const dt=D.dtype;typeChart=new Chart($('typeChart'),{type:'bar',data:{labels:Object.keys(dt),datasets:[{data:Object.values(dt),backgroundColor:'#185FA5',borderWidth:0}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:grid},ticks:{color:tcol}},y:{grid:{display:false},ticks:{color:tcol,font:{size:11}}}}}});
}
function setLive(state,txt){const d=$('ld');d.className='ld'+(state==='err'?' err':state==='stale'?' stale':'');$('lt').textContent=txt;}
async function load(){
  try{
    const bust=(SHEET_CSV_URL.includes('?')?'&':'?')+'_t='+Date.now();
    const res=await fetch(SHEET_CSV_URL+bust);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=parseCSV(await res.text());
    if(rows.length<2)throw new Error('empty sheet');
    D=build(rows); lastGood=rows;
    const now=new Date();
    $('gen').textContent=`${D.kpi.total} sites · live · updated ${now.toLocaleTimeString()} · WordPress SOP v3`;
    $('banner').style.display='none';
    renderAll();
    setLive('live','Live · '+now.toLocaleTimeString());
  }catch(e){
    if(lastGood){setLive('stale','Reconnecting…');}
    else{setLive('err','Can\'t reach sheet');$('banner').style.display='block';$('banner').textContent='Could not load data: '+e.message+'. Check the sheet is published to the web.';}
  }
}
load();
setInterval(load,REFRESH_MS);
</script></body></html>
