<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Metrics Dashboard</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c2430; --border:#2a3441;
    --text:#e6edf3; --muted:#8b98a5; --accent:#3b82f6; --accent-2:#22c55e;
    --accent-3:#f59e0b; --grid:#232c38; --danger:#ef4444;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);
       -webkit-font-smoothing:antialiased;line-height:1.4}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
  header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px}
  h1{font-size:20px;margin:0;font-weight:650;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);
          background:var(--panel);border:1px solid var(--border);padding:7px 12px;border-radius:20px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-2);
       box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 2s infinite}
  .dot.stale{background:var(--accent-3);animation:none}
  .dot.err{background:var(--danger);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-size:26px;font-weight:680;margin-top:8px;letter-spacing:-.02em}
  .kpi .delta{font-size:12px;margin-top:6px;color:var(--muted)}
  .kpi .delta.up{color:var(--accent-2)} .kpi .delta.down{color:var(--danger)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
  .card h2{font-size:14px;margin:0 0 14px;font-weight:600;color:var(--text)}
  svg{width:100%;height:auto;display:block;overflow:visible}
  .axis{fill:var(--muted);font-size:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:550;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .banner{background:#3a1d1d;border:1px solid #5c2a2a;color:#ffb4b4;padding:10px 14px;
          border-radius:10px;font-size:13px;margin-bottom:18px;display:none}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Live Metrics Dashboard</h1>
      <div class="sub">Powered by Composio → Google Sheets → auto-refresh</div>
    </div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <section class="kpis" id="kpis"></section>

  <div class="grid2">
    <div class="card"><h2>Signups over time</h2><div id="chartSignups"></div></div>
    <div class="card"><h2>Revenue over time</h2><div id="chartRevenue"></div></div>
  </div>

  <div class="card">
    <h2>All records</h2>
    <div style="overflow-x:auto"><table id="table"></table></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — the ONLY line that ever changes.
   Set this to your sheet's published-to-web CSV URL.
   ============================================================ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1zsJoe8W1Pq-vwC32gUbYqEtIncCv1Ut2wZa4at8oXLA/gviz/tq?tqx=out:csv&sheet=Sheet1";
const REFRESH_MS = 30000;

const $ = (id) => document.getElementById(id);
let lastGood = null;

function parseCSV(text){
  const rows=[]; let row=[], field="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=c;
    }else{
      if(c==='"') q=true;
      else if(c===',') {row.push(field);field="";}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field="";}
      else if(c==='\r'){}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>c!==""));
}

const fmtInt = n => n.toLocaleString("en-US");
const fmtMoney = n => "$"+n.toLocaleString("en-US");

function setStatus(state,text){
  const dot=$("dot"); dot.className="dot"+(state==="stale"?" stale":state==="err"?" err":"");
  $("statusText").textContent=text;
}

function renderKPIs(rows){
  const signups=rows.map(r=>+r[1]||0), revenue=rows.map(r=>+r[2]||0), active=rows.map(r=>+r[3]||0);
  const totS=signups.reduce((a,b)=>a+b,0), totR=revenue.reduce((a,b)=>a+b,0);
  const latestA=active[active.length-1]||0;
  const firstS=signups[0]||0, lastS=signups[signups.length-1]||0;
  const growth=firstS?Math.round(((lastS-firstS)/firstS)*100):0;
  const cards=[
    {label:"Total Signups",val:fmtInt(totS)},
    {label:"Total Revenue",val:fmtMoney(totR)},
    {label:"Active Users (latest)",val:fmtInt(latestA)},
    {label:"Signups growth",val:(growth>=0?"+":"")+growth+"%",delta:growth>=0?"up":"down",
     note:`${fmtInt(firstS)} → ${fmtInt(lastS)}/day`},
  ];
  $("kpis").innerHTML=cards.map(c=>`
    <div class="kpi"><div class="label">${c.label}</div>
      <div class="val">${c.val}</div>
      ${c.note?`<div class="delta ${c.delta||''}">${c.note}</div>`:""}
    </div>`).join("");
}

function lineChart(el,labels,values,color){
  const W=460,H=180,pl=40,pr=12,pt=12,pb=26;
  const iw=W-pl-pr, ih=H-pt-pb;
  const max=Math.max(...values,1), min=Math.min(...values,0);
  const x=i=>pl+(values.length<=1?iw/2:(i/(values.length-1))*iw);
  const y=v=>pt+ih-((v-min)/((max-min)||1))*ih;
  const pts=values.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`${pl},${pt+ih} ${pts} ${x(values.length-1)},${pt+ih}`;
  const ticks=4, gl=[...Array(ticks+1)].map((_,k)=>{
    const v=min+(k/ticks)*(max-min); const yy=y(v);
    return `<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--grid)"/>
            <text class="axis" x="${pl-6}" y="${yy+3}" text-anchor="end">${Math.round(v)}</text>`;
  }).join("");
  const xl=labels.map((l,i)=> (i%Math.ceil(labels.length/6)===0||i===labels.length-1)
    ?`<text class="axis" x="${x(i)}" y="${H-8}" text-anchor="middle">${l.slice(5)}</text>`:"").join("");
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}">
    ${gl}
    <polygon points="${area}" fill="${color}" opacity="0.12"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.2"
      stroke-linejoin="round" stroke-linecap="round"/>
    ${values.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="${color}"/>`).join("")}
    ${xl}
  </svg>`;
}

function barChart(el,labels,values,color){
  const W=460,H=180,pl=44,pr=12,pt=12,pb=26;
  const iw=W-pl-pr, ih=H-pt-pb;
  const max=Math.max(...values,1);
  const bw=iw/values.length*0.62, gap=iw/values.length;
  const y=v=>pt+ih-(v/max)*ih;
  const ticks=4, gl=[...Array(ticks+1)].map((_,k)=>{
    const v=(k/ticks)*max; const yy=y(v);
    return `<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--grid)"/>
            <text class="axis" x="${pl-6}" y="${yy+3}" text-anchor="end">${Math.round(v)}</text>`;
  }).join("");
  const bars=values.map((v,i)=>{
    const bx=pl+i*gap+(gap-bw)/2, by=y(v);
    return `<rect x="${bx}" y="${by}" width="${bw}" height="${pt+ih-by}" rx="2.5" fill="${color}"/>`;
  }).join("");
  const xl=labels.map((l,i)=> (i%Math.ceil(labels.length/6)===0||i===labels.length-1)
    ?`<text class="axis" x="${pl+i*gap+gap/2}" y="${H-8}" text-anchor="middle">${l.slice(5)}</text>`:"").join("");
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}">${gl}${bars}${xl}</svg>`;
}

function renderTable(header,rows){
  const head=`<tr>${header.map((h,i)=>`<th class="${i>0?'num':''}">${h}</th>`).join("")}</tr>`;
  const body=rows.slice().reverse().map(r=>`<tr>${r.map((c,i)=>
    `<td class="${i>0?'num':''}">${i>0&&i===2?fmtMoney(+c||0):i>0?fmtInt(+c||0):c}</td>`).join("")}</tr>`).join("");
  $("table").innerHTML=head+body;
}

function render(rows){
  const header=rows[0], data=rows.slice(1);
  const labels=data.map(r=>r[0]);
  renderKPIs(data);
  lineChart($("chartSignups"),labels,data.map(r=>+r[1]||0),"var(--accent)");
  barChart($("chartRevenue"),labels,data.map(r=>+r[2]||0),"var(--accent-3)");
  renderTable(header,data);
}

async function load(){
  if(!/^https?:/.test(SHEET_CSV_URL) && !/^data:/.test(SHEET_CSV_URL)){
    setStatus("err","No CSV URL configured");
    $("banner").style.display="block";
    $("banner").textContent="Dashboard not yet wired to a sheet — publish the sheet to the web and set SHEET_CSV_URL.";
    return;
  }
  try{
    const bust=SHEET_CSV_URL.startsWith("http")?((SHEET_CSV_URL.includes("?")?"&":"?")+"_t="+Date.now()):"";
    const res=await fetch(SHEET_CSV_URL+bust);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows=parseCSV(await res.text());
    if(rows.length<2) throw new Error("empty sheet");
    lastGood=rows; render(rows);
    $("banner").style.display="none";
    const now=new Date();
    setStatus("live","Live · updated "+now.toLocaleTimeString());
  }catch(e){
    if(lastGood){ setStatus("stale","Reconnecting… (showing last data)"); }
    else{
      setStatus("err","Can't reach sheet");
      $("banner").style.display="block";
      $("banner").textContent="Couldn't load data: "+e.message+". Check the sheet is published to the web.";
    }
  }
}
load();
setInterval(load,REFRESH_MS);
</script>
</body>
</html>
